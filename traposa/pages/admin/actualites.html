<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Jere Aktualite — Admin TRAPOSA</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-page">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <img src="../../assets/img/TRAPOSALOGO.png" alt="TRAPOSA">
    </div>
    <nav>
      <ul class="admin-nav">
        <li><a href="./dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i>Tablo</a></li>
        <li><a href="./projets.html" class="admin-nav-link"><i data-lucide="folder"></i>Projè</a></li>
        <li><a href="./actualites.html" class="admin-nav-link active"><i data-lucide="file-text"></i>Aktualite</a></li>
        <li><a href="./galerie.html" class="admin-nav-link"><i data-lucide="image"></i>Galeri</a></li>
        <li><a href="./dons.html" class="admin-nav-link"><i data-lucide="heart"></i>Don</a></li>
        <li><a href="./equipe.html" class="admin-nav-link"><i data-lucide="users"></i>Ekip</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Jere Aktualite</h1>
      <a href="?action=new" class="btn btn-primary"><i data-lucide="plus"></i>Nouvo Atik</a>
    </div>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Tit</th>
            <th>Kategori</th>
            <th>Aktè</th>
            <th>Dat</th>
            <th>Status</th>
            <th>Aksyon</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>TRAPOSA rive bay 1000 timoun manje</strong></td>
            <td>Siksè</td>
            <td>Ekip TRAPOSA</td>
            <td>2 jou pase</td>
            <td><span class="admin-status published">Pibliye</span></td>
            <td class="table-actions">
              <button class="table-btn"><i data-lucide="edit"></i></button>
              <button class="table-btn delete"><i data-lucide="trash-2"></i></button>
            </td>
          </tr>
          <tr>
            <td><strong>Ijans: Repons inondasyon</strong></td>
            <td>Ijans</td>
            <td>Dr. Beaumont</td>
            <td>5 jou pase</td>
            <td><span class="admin-status published">Pibliye</span></td>
            <td class="table-actions">
              <button class="table-btn"><i data-lucide="edit"></i></button>
              <button class="table-btn delete"><i data-lucide="trash-2"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal for Add/Edit Article -->
  <div id="articleModal" class="admin-modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Nouvo Atik</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="articleForm" class="modal-form">
        <input type="hidden" id="articleId">
        <div class="form-group">
          <label class="form-label">Tit *</label>
          <input type="text" class="form-input" id="articleTitle" required>
        </div>
        <div class="form-group">
          <label class="form-label">Slug</label>
          <input type="text" class="form-input" id="articleSlug">
        </div>
        <div class="form-group">
          <label class="form-label">Kategori</label>
          <select class="form-select" id="articleCategory">
            <option value="siksè">Siksè</option>
            <option value="ijan">Ijan</option>
            <option value="rapò">Rapò</option>
            <option value="nouvèl">Nouvèl</option>
            <option value="partenariat">Partenariat</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Excerpt</label>
          <textarea class="form-textarea" rows="2" id="articleExcerpt"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Konteni</label>
          <textarea class="form-textarea" rows="8" id="articleContent"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Aktè</label>
          <input type="text" class="form-input" id="articleAuthor" value="Ekip TRAPOSA">
        </div>
        <div class="form-group">
          <label class="form-label">Imaj Kouvèti</label>
          <input type="file" class="form-input" id="articleImage" accept="image/*">
          <div id="imagePreview" class="image-preview"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Pibliye</label>
          <input type="checkbox" id="articlePublished">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Anile</button>
          <button type="submit" class="btn btn-primary">Sove</button>
        </div>
      </form>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/admin/actualites.js"></script>
</body>
</html>
