<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Jere Projè — Admin TRAPOSA</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-page">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <img src="../../assets/img/TRAPOSALOGO.png" alt="TRAPOSA">
    </div>
    <nav>
      <ul class="admin-nav">
        <li><a href="./dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i>Tablo</a></li>
        <li><a href="./projets.html" class="admin-nav-link active"><i data-lucide="folder"></i>Projè</a></li>
        <li><a href="./actualites.html" class="admin-nav-link"><i data-lucide="file-text"></i>Aktualite</a></li>
        <li><a href="./dons.html" class="admin-nav-link"><i data-lucide="heart"></i>Don</a></li>
        <li><a href="./equipe.html" class="admin-nav-link"><i data-lucide="users"></i>Ekip</a></li>
        <li><a href="./parametres.html" class="admin-nav-link"><i data-lucide="settings"></i>Paramèt</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Jere Projè</h1>
      <a href="?action=new" class="btn btn-primary"><i data-lucide="plus"></i>Nouvo Pwojè</a>
    </div>

    <div class="admin-filters">
      <div class="filter-group">
        <label>Status:</label>
        <select class="filter-select">
          <option>Tout</option>
          <option>Aktif</option>
          <option>An Planifikasyon</option>
          <option>Fin</option>
        </select>
      </div>
      <div class="admin-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Chache projè...">
      </div>
    </div>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Projè</th>
            <th>Kategori</th>
            <th>Location</th>
            <th>Goal</th>
            <th>Kolekte</th>
            <th>Status</th>
            <th>Aksyon</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Lekòl Pou Tout</strong></td>
            <td>Edikasyon</td>
            <td>Nò</td>
            <td>G150,000</td>
            <td>G67,000</td>
            <td><span class="admin-status active">Aktif</span></td>
            <td class="table-actions">
              <button class="table-btn"><i data-lucide="edit"></i></button>
              <button class="table-btn delete"><i data-lucide="trash-2"></i></button>
            </td>
          </tr>
          <tr>
            <td><strong>Klinik Mobil</strong></td>
            <td>Sante</td>
            <td>Sid</td>
            <td>G200,000</td>
            <td>G156,000</td>
            <td><span class="admin-status active">Aktif</span></td>
            <td class="table-actions">
              <button class="table-btn"><i data-lucide="edit"></i></button>
              <button class="table-btn delete"><i data-lucide="trash-2"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="admin-pagination">
        <button class="pagination-btn" disabled><i data-lucide="chevron-left"></i></button>
        <button class="pagination-btn active">1</button>
        <button class="pagination-btn">2</button>
        <button class="pagination-btn"><i data-lucide="chevron-right"></i></button>
      </div>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
