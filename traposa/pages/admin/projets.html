<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Jere Projè — Admin TRAPOSA</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-page">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <img src="../../assets/img/TRAPOSALOGO.png" alt="TRAPOSA">
    </div>
    <nav>
      <ul class="admin-nav">
        <li><a href="./dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i>Tablo</a></li>
        <li><a href="./projets.html" class="admin-nav-link active"><i data-lucide="folder"></i>Projè</a></li>
        <li><a href="./actualites.html" class="admin-nav-link"><i data-lucide="file-text"></i>Aktualite</a></li>
        <li><a href="./galerie.html" class="admin-nav-link"><i data-lucide="image"></i>Galeri</a></li>
        <li><a href="./dons.html" class="admin-nav-link"><i data-lucide="heart"></i>Don</a></li>
        <li><a href="./equipe.html" class="admin-nav-link"><i data-lucide="users"></i>Ekip</a></li>
        <li><a href="./parametres.html" class="admin-nav-link"><i data-lucide="settings"></i>Paramèt</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Jere Projè</h1>
      <a href="../../index.html" class="btn btn-outline">
        <i data-lucide="home"></i>
        <span>Retounen nan Sit</span>
      </a>
      <a href="?action=new" class="btn btn-primary"><i data-lucide="plus"></i>Nouvo Pwojè</a>
    </div>

    <div class="admin-filters">
      <div class="filter-group">
        <label>Status:</label>
        <select class="filter-select">
          <option>Tout</option>
          <option>Aktif</option>
          <option>An Planifikasyon</option>
          <option>Fin</option>
        </select>
      </div>
      <div class="admin-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Chache projè...">
      </div>
    </div>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Projè</th>
            <th>Kategori</th>
            <th>Location</th>
            <th>Goal</th>
            <th>Kolekte</th>
            <th>Status</th>
            <th>Aksyon</th>
          </tr>
        </thead>
        <tbody id="projectsTable">
          <!-- Projects loaded dynamically from Supabase -->
        </tbody>
      </table>
      <div class="admin-pagination">
        <button class="pagination-btn" disabled><i data-lucide="chevron-left"></i></button>
        <button class="pagination-btn active">1</button>
        <button class="pagination-btn">2</button>
        <button class="pagination-btn"><i data-lucide="chevron-right"></i></button>
      </div>
    </div>
  </main>

  <!-- Modal for Add/Edit Project -->
  <div id="projectModal" class="admin-modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Nouvo Pwojè</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="projectForm" class="modal-form">
        <input type="hidden" id="projectId">
        <div class="form-group">
          <label class="form-label">Tit *</label>
          <input type="text" class="form-input" id="projectTitle" required>
        </div>
        <div class="form-group">
          <label class="form-label">Slug</label>
          <input type="text" class="form-input" id="projectSlug">
        </div>
        <div class="form-group">
          <label class="form-label">Deskripsyon</label>
          <textarea class="form-textarea" rows="3" id="projectDescription"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Kategori *</label>
          <select class="form-select" id="projectCategory" required>
            <option value="Edikasyon">Edikasyon</option>
            <option value="Sante">Sante</option>
            <option value="Agrikilti">Agrikilti</option>
            <option value="Anviwonman">Anviwonman</option>
            <option value="Ijans">Ijans</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Lokasyon</label>
            <input type="text" class="form-input" id="projectLocation">
          </div>
          <div class="form-group">
            <label class="form-label">Depatman</label>
            <input type="text" class="form-input" id="projectDepartment">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Goal (G)</label>
            <input type="number" class="form-input" id="projectGoal" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Kolekte (G)</label>
            <input type="number" class="form-input" id="projectRaised" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Benefisiè</label>
            <input type="number" class="form-input" id="projectBeneficiaires" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="projectStatus">
              <option value="active">Aktif</option>
              <option value="planning">An Planifikasyon</option>
              <option value="paused">Poze</option>
              <option value="completed">Fin</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Imaj Kouvèti</label>
          <input type="file" class="form-input" id="projectImage" accept="image/*">
          <div id="imagePreview" class="image-preview"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Featured</label>
          <input type="checkbox" id="projectFeatured">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Anile</button>
          <button type="submit" class="btn btn-primary">Sove</button>
        </div>
      </form>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/admin/projets.js"></script>
</body>
</html>
