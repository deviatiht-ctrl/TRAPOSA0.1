<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Paramèt — Admin TRAPOSA</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="admin-page">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <img src="../../assets/img/TRAPOSALOGO.png" alt="TRAPOSA">
    </div>
    <nav>
      <ul class="admin-nav">
        <li><a href="./dashboard.html" class="admin-nav-link"><i data-lucide="layout-dashboard"></i>Tablo</a></li>
        <li><a href="./parametres.html" class="admin-nav-link active"><i data-lucide="settings"></i>Paramèt</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Paramèt</h1>
    </div>

    <form class="admin-form">
      <div class="settings-section">
        <h4>Enfòmasyon Òganizasyon</h4>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label required">Non Òganizasyon</label>
            <input type="text" class="form-input" value="TRAPOSA">
          </div>
          <div class="form-group">
            <label class="form-label">Slogan</label>
            <input type="text" class="form-input" value="TRANSFORMER pour Sauver">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Deskripsyon</label>
          <textarea class="form-textarea" rows="3">Òganizasyon sosyal ayisyen...</textarea>
        </div>
      </div>

      <div class="settings-section">
        <h4>Kontak</h4>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Imèl</label>
            <input type="email" class="form-input" value="info@traposa.ht">
          </div>
          <div class="form-group">
            <label class="form-label">Telefòn</label>
            <input type="tel" class="form-input" value="+509 2813-4567">
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h4>Pèman</h4>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">MonCash Nimewo</label>
            <input type="text" class="form-input" placeholder="+509...">
          </div>
          <div class="form-group">
            <label class="form-label">NatCash Nimewo</label>
            <input type="text" class="form-input" placeholder="+509...">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Non Bank</label>
            <input type="text" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Kont Bank</label>
            <input type="text" class="form-input">
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h4>Estatistik Sit (Enpak)</h4>
        <p class="form-hint">Chif sa yo afiche nan paj akèy la. Antre nouvo vale yo.</p>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Benefisiè Dirèk</label>
            <input type="number" class="form-input" id="statBeneficiaires" value="12450" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Projè Aktif</label>
            <input type="number" class="form-input" id="statProjets" value="48" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Bénévòl Aktif</label>
            <input type="number" class="form-input" id="statBenevoles" value="500" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Total Don (Goud)</label>
            <input type="number" class="form-input" id="statDons" value="450000" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Komin Travay</label>
            <input type="number" class="form-input" id="statKomin" value="23" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Lane Eskperyans</label>
            <input type="number" class="form-input" id="statExperience" value="10" min="0">
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h4>Opsyon</h4>
        <div class="toggle-switch">
          <label class="toggle-input">
            <input type="checkbox">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">Mode Antretyen</span>
        </div>
      </div>

      <div style="margin-top: 2rem;">
        <button type="submit" class="btn btn-primary">Sove Chanje</button>
      </div>
    </form>
  </main>

  <script>lucide.createIcons();</script>
<script src="../../assets/js/supabase-client.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/admin/parametres.js"></script>
<script>(async () => { await requireAdmin(); })();</script>
</body>
</html>
