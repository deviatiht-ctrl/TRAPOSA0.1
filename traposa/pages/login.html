<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koneksyon — TRAPOSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-visual">
      <div class="auth-visual-logo">
        <img src="../assets/img/TRAPOSALOGO.png" alt="TRAPOSA" style="max-width: 200px; height: auto;">
      </div>
      <div class="auth-visual-content">
        <h2>Ann Ansam Nou Pi Fo</h2>
        <p>Kreye yon kont pou swiv don ou yo, jwenn reki pou kontribisyon ou, ak resevwa enfòmasyon eksklizif sou enpak nou an.</p>
      </div>
      <div class="auth-visual-stats">
        <div class="auth-visual-stat">
          <div class="auth-visual-stat-number">12K+</div>
          <div class="auth-visual-stat-label">Manm</div>
        </div>
        <div class="auth-visual-stat">
          <div class="auth-visual-stat-number">500+</div>
          <div class="auth-visual-stat-label">Bénévòl</div>
        </div>
      </div>
    </div>

    <div class="auth-form-section">
      <div class="auth-form-header">
        <h1>Byenveni</h1>
        <p>Konekte oswa kreye kont ou</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Konekte</button>
        <button class="auth-tab" data-tab="register">Enskri</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm">
        <div class="form-group">
          <label class="form-label">Imèl</label>
          <input type="email" class="form-input" name="email" required placeholder="imel@egzanp.com">
        </div>
        <div class="form-group">
          <label class="form-label">Modpas</label>
          <div class="password-field">
            <input type="password" class="form-input" name="password" required>
            <button type="button" class="password-toggle">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>
        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" name="remember">
            <span>Sonje m</span>
          </label>
          <a href="#" class="forgot-password">Bliye modpas?</a>
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary auth-submit-btn">Konekte</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label class="form-label">Non Konplè</label>
          <input type="text" class="form-input" name="full_name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Imèl</label>
          <input type="email" class="form-input" name="email" required placeholder="imel@egzanp.com">
        </div>
        <div class="form-group">
          <label class="form-label">Modpas</label>
          <div class="password-field">
            <input type="password" class="form-input" name="password" required minlength="8">
          </div>
        </div>
        <div class="terms-group">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">Mwen aksepte <a href="#">kondisyon itilizasyon</a> ak <a href="#">politik konfidansyalite</a> TRAPOSA.</label>
        </div>
        <div class="form-error" id="registerError"></div>
        <button type="submit" class="btn btn-primary auth-submit-btn">Kreye Kont</button>
      </form>

      <div class="auth-divider">Oswa kontinye ak</div>
      <div class="social-auth">
        <button class="social-btn">
          <i data-lucide="mail"></i>
          Google
        </button>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
      });
    });

    // Form submissions
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const { error } = await auth.signIn(formData.get('email'), formData.get('password'));
      if (error) {
        document.getElementById('loginError').textContent = error.message;
        document.getElementById('loginError').classList.add('show');
      } else {
        window.location.href = './dashboard.html';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const { error } = await auth.signUp(formData.get('email'), formData.get('password'), {
        full_name: formData.get('full_name')
      });
      if (error) {
        document.getElementById('registerError').textContent = error.message;
        document.getElementById('registerError').classList.add('show');
      } else {
        window.location.href = './dashboard.html';
      }
    });
  </script>
</body>
</html>
